<!--
  Şablonların (templates) içinde .value kullanmamıza gerek olmadığına
  dikkat edin; çünkü ref'ler buralarda otomatik olarak çözülür ("unwrap" edilir).
-->
<h1>{{ message }}</h1>

<!--
  Bir metoda/fonksiyona bağlama işlemi.
  Buradaki @click yazımı aslında v-on:click için kullandığımız bir kısaltmadır.
-->
<button @click="reverseMessage">Mesajı Tersine Çevir</button>

<!-- Aynı zamanda satır içi (inline) bir ifade de çalıştırabiliriz -->
<button @click="message += '!'">Sonuna "!" Ekle</button>

<!--
  Vue ayrıca, e.preventDefault() ve e.stopPropagation()
  gibi sıkça ihtiyaç duyulan işlemler için bize belirleyiciler (modifiers) de sunar.
-->
<a href="https://vuejs.org" @click.prevent="notify">
  Tıklanınca e.preventDefault() çalıştıran bir link
</a>
