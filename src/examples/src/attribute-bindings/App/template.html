<p>
  <span :title="message">
    Dinamik olarak bağlanmış başlığımı (title) görmek için farenizi birkaç saniye üzerimde bekletin!
  </span>
</p>

<!--
sınıf (class) bağlamasında düz dizelerin (strings) yanı sıra
nesneler (objects) ve diziler (arrays) de özel olarak desteklenir
-->
<p :class="{ red: isRed }" @click="toggleRed">
  Bunun rengi kırmızı olmalı... Değiştirmek için üzerime tıklayın.
</p>

<!-- style bağlamaları da benzer şekilde nesneleri ve dizileri destekler -->
<p :style="{ color }" @click="toggleColor">
  Bunun rengi yeşil olmalı, tıklandıkça da yeşil ve mavi arasında gidip gelmelidir.
</p>
