<button @click="insert">Rastgele Bir Yere Ekle</button>
<button @click="reset">Sıfırla</button>
<button @click="shuffle">Karıştır</button>

<TransitionGroup tag="ul" name="fade" class="container">
  <li v-for="item in items" class="item" :key="item">
    {{ item }}
    <button @click="remove(item)">x</button>
  </li>
</TransitionGroup>
