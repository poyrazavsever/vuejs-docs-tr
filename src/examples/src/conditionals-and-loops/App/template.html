<button @click="show = !show">Listeyi Aç/Kapat</button>
<button @click="list.push(list.length + 1)">Sayı Ekle</button>
<button @click="list.pop()">Sayı Çıkar</button>
<button @click="list.reverse()">Listeyi Tersine Çevir</button>

<ul v-if="show && list.length">
  <li v-for="item of list">{{ item }}</li>
</ul>
<p v-else-if="list.length">Liste boş değil, ancak şu an gizlenmiş durumda.</p>
<p v-else>Liste boş.</p>
