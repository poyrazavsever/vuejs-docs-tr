<svg @click="onClick">
  <foreignObject x="0" y="40%" width="100%" height="200">
    <p class="tip">
      Bir çember çizmek için tuval (canvas) üzerine tıklayın. Çemberi seçmek için üzerine tıklayın.
      Seçili çemberin yarıçapını ayarlamak için çemberin üzerine sağ tıklayın.
    </p>
  </foreignObject>
  <circle
    v-for="circle in circles"
    :cx="circle.cx"
    :cy="circle.cy"
    :r="circle.r"
    :fill="circle === selected ? '#ccc' : '#fff'"
    @click="selected = circle"
    @contextmenu.prevent="adjust(circle)"
  ></circle>
</svg>

<div class="controls">
  <button @click="undo" :disabled="index <= 0">Geri Al</button>
  <button @click="redo" :disabled="index >= history.length - 1">Yinele</button>
</div>

<div class="dialog" v-if="adjusting" @click.stop>
  <p>({{ selected.cx }}, {{ selected.cy }}) konumundaki çemberin yarıçapını ayarla</p>
  <input type="range" v-model="selected.r" min="1" max="300">
</div>
