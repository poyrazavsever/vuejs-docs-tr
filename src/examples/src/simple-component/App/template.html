<ol>
  <!--
    İçeriğinin dinamik olabilmesi adına her bir todo-item'a
    temsil edeceği todo (görev) nesnesini aktarıyoruz.
    Ayrıca her bileşene (component) özel bir "key" de atamamız gerekiyor,
    bunun nedeni kılavuzdaki v-for bölümünde detaylıca açıklanmıştır.
  -->
  <TodoItem
    v-for="item in groceryList"
    :todo="item"
    :key="item.id"
  ></TodoItem>
</ol>
