<button id="show-modal" @click="showModal = true">Modalı Göster</button>

<Teleport to="body">
  <!-- modal bileşenini kullanıyoruz, prop olarak verimizi iletiyoruz -->
  <modal :show="showModal" @close="showModal = false">
    <template #header>
      <h3>Özel Başlık</h3>
    </template>
  </modal>
</Teleport>
