<div><input v-model="prefix" placeholder="Öneke göre filtrele"></div>

<select size="5" v-model="selected">
  <option v-for="name in filteredNames" :key="name">{{ name }}</option>
</select>

<label>Soyisim: <input v-model="last"></label>
<label>İsim: <input v-model="first"></label>

<div class="buttons">
  <button @click="create">Oluştur</button>
  <button @click="update">Güncelle</button>
  <button @click="del">Sil</button>
</div>
